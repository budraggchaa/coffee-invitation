<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: url("BOROO.gif") center/cover no-repeat;
      overflow: hidden;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 32px 24px 40px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      position: relative;
      animation: floatCard 3s ease-in-out infinite;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .coffee {
      font-size: 56px;
      margin-bottom: 10px;
      animation: steam 2s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes steam {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    h1 {
      margin: 8px 0 14px;
      font-size: 30px;
      color: #4a2c1d;
      min-height: 72px;
    }

    p {
      margin: 10px 0;
      color: #5f4638;
      font-size: 17px;
      line-height: 1.5;
    }

    .small {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 18px;
    }

    .button-area {
      margin-top: 28px;
      position: relative;
      height: 90px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: absolute;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
    }

    #yesBtn {
      left: 28%;
      top: 20px;
      background: #6f4e37;
      color: white;
    }

    #maybeBtn {
      left: 55%;
      top: 20px;
      background: #efe3d6;
      color: #5a3a28;
    }

    .result {
      margin-top: 24px;
      font-size: 18px;
      font-weight: bold;
      color: #4a2c1d;
      min-height: 28px;
    }

    .footer-hearts {
      margin-top: 18px;
      font-size: 20px;
      letter-spacing: 6px;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      .card {
        padding: 28px 18px 34px;
      }

      h1 {
        font-size: 24px;
        min-height: 64px;
      }

      p {
        font-size: 16px;
      }

      #yesBtn {
        left: 18%;
      }

      #maybeBtn {
        left: 54%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="coffee">☕</div>
    <h1 id="typing"></h1>

    <p>
      Code bichih hobbytoimaa bi tgd ene site iig hiisen ym.
    </p >
    <p>
      Tegeed zugeer chataar asuusnaas ingej asuuval hugjiltei yum bolvuu gej bodood.
    </p >
    <p>
      Hamt coffee uuhuu?
    </p >

    <div class="button-area" id="buttonArea">
      <button id="yesBtn">Tegyoo☕</button>
      <button id="maybeBtn">Ugueeee 😄</button>
    </div>

    <div class="result" id="result"></div>
    <div class="footer-hearts">☕ ✨ ☕</div>
    <p class="small">Zavgu bol zugeershuu kk</p >
  </div>

  <script>
    const text = "Za sain baina uu, uurt tani ene udriin mendiig hurgey 🙂";
    const typingEl = document.getElementById("typing");
    const resultEl = document.getElementById("result");
    const yesBtn = document.getElementById("yesBtn");
    const maybeBtn = document.getElementById("maybeBtn");
    const buttonArea = document.getElementById("buttonArea");

    let index = 0;

    function typeText() {
      if (index < text.length) {
        typingEl.textContent += text.charAt(index);
        index++;
        setTimeout(typeText, 70);
      }
    }

    typeText();

    yesBtn.addEventListener("click", () => {
      resultEl.innerHTML = "Za urilga huleen avsand bayarlalaa, zavtai udruu heleerei nadad.";
    });

    maybeBtn.addEventListener("mouseenter", moveMaybeButton);
    maybeBtn.addEventListener("click", moveMaybeButton);

    function moveMaybeButton() {
      const areaWidth = buttonArea.clientWidth;
      const areaHeight = buttonArea.clientHeight;
      const btnWidth = maybeBtn.offsetWidth;
      const btnHeight = maybeBtn.offsetHeight;

      const maxX = areaWidth - btnWidth;
      const maxY = areaHeight - btnHeight;

      const randomX = Math.max(0, Math.floor(Math.random() * maxX));
      const randomY = Math.max(0, Math.floor(Math.random() * maxY));

      maybeBtn.style.left = randomX + "px";
      maybeBtn.style.top = randomY + "px";
    }
  </script>
</body>
</html>
